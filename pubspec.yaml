name: uprising_cockpit
description: "AI-powered mobile dashboard for Quebec plumbers and roofers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

  # Charts
  fl_chart: ^0.68.0

  # Home screen widgets
  home_widget: ^0.7.0

  # Networking/HTTP
  http: ^1.2.1

  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.3
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
